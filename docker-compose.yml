services:
  nginx:
    image: nginx:alpine
    ports:
      - "32065:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      bikekeeper:
        condition: service_started
    networks:
      - bikekeeper
    restart: unless-stopped

  bikekeeper:
    build: ./bikeKeeper
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./bikeKeeper/.env
    networks:
      - bikekeeper
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/api/v1/auth/login || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  ocr-service:
    build: ./OCR_Plate
    expose:
      - "5000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bikekeeper
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:5000/openapi.json || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  postgres:
    image: postgres:17-alpine
    env_file:
      - ./bikeKeeper/.env
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bikekeeper"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - bikekeeper
    restart: unless-stopped

networks:
  bikekeeper:
    driver: bridge

volumes:
  pgdata:
